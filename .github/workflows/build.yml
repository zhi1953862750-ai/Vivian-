name: 炼制掌上酒馆 APK

on:
  workflow_dispatch: # 允许我们手动点击按钮开始打包

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 启动云端超级电脑并配置 Java 环境
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 2. 安装安卓 SDK 和打包工具
        uses: android-actions/setup-android@v3

      - name: 3. CTO的魔法：在云端瞬间手写安卓工程代码
        run: |
          mkdir PocketTavern
          cd PocketTavern
          
          # 创建安卓项目基础结构
          mkdir -p app/src/main/java/com/pocket/tavern
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          
          # 写入 settings.gradle
          echo "rootProject.name = 'PocketTavern'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          # 写入工程的 build.gradle
          echo "buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }" > build.gradle
          
          # 写入 APP的 build.gradle
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.pocket.tavern'
              compileSdk 33
              defaultConfig {
                  applicationId "com.pocket.tavern"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          # 写入 AndroidManifest.xml (申请网络权限和配置全屏)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="便携酒馆" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # 写入前端核心：全屏隐形浏览器 (连接酒馆端口)
          cat << 'EOF' > app/src/main/java/com/pocket/tavern/MainActivity.java
          package com.pocket.tavern;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          
          public class MainActivity extends Activity {
              private WebView myWebView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  myWebView = new WebView(this);
                  WebSettings webSettings = myWebView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  myWebView.setWebViewClient(new WebViewClient());
                  
                  // 第一阶段先让它尝试连接本地酒馆的默认端口
                  myWebView.loadUrl("http://127.0.0.1:8000");
                  setContentView(myWebView);
              }
              @Override
              public void onBackPressed() {
                  if(myWebView.canGoBack()) { myWebView.goBack(); } else { super.onBackPressed(); }
              }
          }
          EOF
          
          # 下载 Gradle 运行器
          gradle wrapper --gradle-version 8.2

      - name: 4. 开始炼制 APK (编译打包)
        run: |
          cd PocketTavern
          ./gradlew assembleDebug

      - name: 5. 将炼制好的 APK 发送给老板下载
        uses: actions/upload-artifact@v3
        with:
          name: PocketTavern-App
          path: PocketTavern/app/build/outputs/apk/debug/app-debug.apk
